name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # Enforces the lean-rs version-floor ban in deny.toml: a partial upgrade
      # that drags a pre-0.3 lean-rs copy back into the graph fails here with a
      # named diagnostic instead of as a deep E0308 in a consumer.
      - name: cargo deny check
        run: cargo deny check

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup show
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Install elan + supported Lean toolchain
        run: |
          set -euo pipefail
          # A real, supported Lean toolchain is mandatory: lean-rs-sys's build.rs
          # discovers the prefix, hashes lean.h, and fails early unless it matches
          # SUPPORTED_TOOLCHAINS (intentional ABI guard). `--default-toolchain none`
          # builds nothing past fmt. Track the fixture's pin so CI follows the
          # supported head automatically.
          toolchain="$(cat fixtures/lean/lean-toolchain)"
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          # lean-rs-sys/build.rs consumes LEAN_SYSROOT; export the shell-expanded
          # path so discovery does not depend on PATH ordering.
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---${toolchain##*:}" >> "$GITHUB_ENV"
      - name: fmt
        run: cargo fmt --all -- --check
      # clippy --workspace is link-safe (no final link happens) per CLAUDE.md.
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # Build and test PER-MEMBER, never workspace-wide: a `--all-targets`
      # workspace build unifies the lean-rs-sys feature set across the parent and
      # worker, silently re-linking libleanshared into the parent (CLAUDE.md
      # "Always build per-member"). That also makes the parent's own test binary
      # unrunnable — it would reference @rpath/libleanshared.dylib with no rpath.
      - name: build (parent)
        run: cargo build -p lean-host-mcp --all-targets
      - name: build (worker)
        run: cargo build -p lean-host-mcp-worker --all-targets
      - name: test (parent)
        run: cargo test -p lean-host-mcp --all-targets
      # The parent must NOT link libleanshared. Built as a separate per-member
      # release invocation so the worker's feature set never unifies in.
      - name: parent ⊥ libleanshared
        run: |
          set -euo pipefail
          cargo build --release -p lean-host-mcp
          if ldd target/release/lean-host-mcp | grep -q libleanshared; then
            echo "FAIL: parent links libleanshared" >&2
            exit 1
          fi

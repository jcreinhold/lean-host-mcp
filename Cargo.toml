[package]
authors = ["Jacob Reinhold <jcreinhold@gmail.com>"]
categories = ["development-tools"]
description = "MCP server hosting Lean 4 in-process via lean-rs"
edition = "2024"
keywords = ["lean", "lean4", "mcp", "model-context-protocol"]
license = "MIT OR Apache-2.0"
name = "lean-host-mcp"
publish = false
repository = "https://github.com/jcreinhold/lean-host-mcp"
rust-version = "1.91"
version = "0.1.0"

[lib]
name = "lean_host_mcp"
path = "src/lib.rs"

[[bin]]
name = "lean-host-mcp"
path = "src/main.rs"

[[bin]]
name = "lean-host-mcp-worker"
path = "src/bin/worker.rs"

[[bench]]
harness = false
name = "worker_roundtrip"

[[bench]]
harness = false
name = "worker_cold_spawn"

[[bench]]
harness = false
name = "process_module_owned"

[[bench]]
harness = false
name = "position_lookup_after_cache_warm"

[[bench]]
harness = false
name = "multi_project_dispatch"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
dirs = "6"
lru = "0.18"
parking_lot = "0.12"
regex = "1"
rmcp = { version = "1.7", features = ["macros", "schemars", "server", "transport-io"] }
rusqlite = { version = "0.39", features = ["bundled"] }
schemars = "1.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
toml = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
walkdir = "2"

lean-rs-worker = "0.1.7"

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }
insta = { version = "1", features = ["json"] }
tempfile = "3"

[lints.rust]
future-incompatible = "warn"
let-underscore = "warn"
nonstandard-style = "warn"
redundant_lifetimes = "warn"
rust-2018-idioms = "warn"
rust-2024-compatibility = "deny"
single_use_lifetimes = "warn"
trivial_casts = "warn"
unreachable_pub = "warn"
unsafe-code = "forbid"
unused = { level = "warn", priority = -1 }

# Comprehensive Clippy configuration for correctness, performance, and style
# (ported from ~/Code/lean-dup).
[lints.clippy]
# === CORRECTNESS & BUG PREVENTION ===
all = { level = "warn", priority = -10 }
complexity = { level = "warn", priority = -9 }
correctness = { level = "warn", priority = -8 }
suspicious = { level = "warn", priority = -7 }

# === PERFORMANCE OPTIMIZATION ===
clone_on_ref_ptr = "warn"
inefficient_to_string = "warn"
large_stack_arrays = "warn"
manual_memcpy = "warn"
perf = { level = "warn", priority = -6 }
redundant_clone = "warn"

# === STYLE & IDIOMATIC RUST ===
nursery = { level = "warn", priority = -5 }
pedantic = { level = "warn", priority = -4 }
style = { level = "warn", priority = -3 }

# === SAFETY & RELIABILITY ===
arithmetic_side_effects = "warn"
exit = "warn"
expect_used = "warn"
get_unwrap = "warn"
indexing_slicing = "warn"
mem_forget = "deny"
mutex_integer = "warn"
panic = "warn"
ptr_as_ptr = "warn"
rc_mutex = "warn"
todo = "warn"
unimplemented = "warn"
unreachable = "warn"
unwrap_in_result = "warn"
unwrap_used = "warn"
wildcard_enum_match_arm = "warn"

# === DOCUMENTATION & MAINTAINABILITY ===
blanket_clippy_restriction_lints = "warn"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
missing_safety_doc = "warn"

# === CARGO & DEPENDENCY MANAGEMENT ===
cargo = { level = "warn", priority = -1 }
cargo_common_metadata = "allow"
lint_groups_priority = "warn"

# === ALLOWABLE EXCEPTIONS ===
items_after_statements = "allow"
match_same_arms = "allow"
missing_const_for_fn = "allow"
missing_docs_in_private_items = "allow"
module_name_repetitions = "allow"
multiple_crate_versions = "allow"
must_use_candidate = "allow"
option_if_let_else = "allow"
redundant_closure_for_method_calls = "allow"
redundant_pub_crate = "allow"
similar_names = "allow"
single_match_else = "allow"
too_many_arguments = "allow"
too_many_lines = "allow"
type_complexity = "allow"
unnecessary_wraps = "allow"

# === ALLOWABLE EXCEPTIONS FOR NUMERICAL REASONS ===
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
float_arithmetic = "allow"

# === ADDITIONAL SAFETY LINTS ===
disallowed_methods = "deny"
disallowed_types = "deny"
implicit_clone = "warn"
map_flatten = "warn"
map_unwrap_or = "warn"
needless_collect = "warn"
